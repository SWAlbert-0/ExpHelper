spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  servlet:
    multipart:
      max-file-size: ${SPRING_MULTIPART_MAX_FILE_SIZE:100MB}
      max-request-size: ${SPRING_MULTIPART_MAX_REQUEST_SIZE:100MB}
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://user:123456@localhost:27017/expHlp?authSource=expHlp}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:user}
    password: ${RABBITMQ_PASSWORD:123456}


#  rabbitmq:
#    host: localhost
#    port: 5672
#    virtual-host:
#    username: guest
#    password: guest
#  rabbitmq:
#    host: localhost
#    port: 5672
#    virtual-host:
#    username: user
#    password: 123456

  application:
    name: ${SPRING_APPLICATION_NAME:nacos-order-consumer}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}

#消费者将要去访问的微服务名称(注册成功进nacos的微服务提供者)
service-url:
  nacos-user-service: ${NACOS_USER_SERVICE_URL:http://nacos-client-service}

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET:change-me-in-dev}
    expire-seconds: ${AUTH_JWT_EXPIRE_SECONDS:86400}
  remember:
    expire-days: ${AUTH_REMEMBER_EXPIRE_DAYS:30}
  avatar-dir: ${AUTH_AVATAR_DIR:./data/uploads/avatar}

alg:
  call:
    connect-timeout-ms: ${ALG_CALL_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${ALG_CALL_READ_TIMEOUT_MS:60000}
    retry-times: ${ALG_CALL_RETRY_TIMES:1}

notify:
  mail:
    enabled: ${NOTIFY_MAIL_ENABLED:true}
  wechat:
    enabled: ${NOTIFY_WECHAT_ENABLED:false}
