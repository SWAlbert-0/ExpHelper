<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .title { font: 700 34px "Microsoft YaHei", Arial, sans-serif; fill: #1f2937; }
      .nodeTitle { font: 700 22px "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .text { font: 500 18px "Microsoft YaHei", Arial, sans-serif; fill: #334155; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; }
      .svc { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; }
      .edge { stroke: #2563eb; stroke-width: 2; marker-end: url(#m); fill: none; }
      .label { font: 500 16px "Microsoft YaHei", Arial, sans-serif; fill: #1d4ed8; }
    </style>
    <marker id="m" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="#2563eb"/>
    </marker>
  </defs>

  <text x="800" y="56" text-anchor="middle" class="title">实验平台部署图（前置工作阶段）</text>

  <rect x="60" y="100" width="1480" height="820" rx="12" class="box"/>
  <text x="95" y="135" class="nodeTitle">Docker Host / Target Machine</text>

  <rect x="120" y="180" width="430" height="300" rx="10" class="svc"/>
  <text x="145" y="215" class="nodeTitle">c_exphlp_vue_front</text>
  <text x="145" y="250" class="text">Nginx + Vue2 静态资源</text>
  <text x="145" y="280" class="text">Port: 8086</text>
  <text x="145" y="310" class="text">职责：计划管理、日志与结果展示</text>

  <rect x="600" y="180" width="430" height="300" rx="10" class="svc"/>
  <text x="625" y="215" class="nodeTitle">c_exphlp_webapp</text>
  <text x="625" y="250" class="text">Spring Boot WebApp</text>
  <text x="625" y="280" class="text">Port: 8080</text>
  <text x="625" y="310" class="text">职责：计划编排、指标汇总、通知投递</text>

  <rect x="1080" y="180" width="390" height="300" rx="10" class="svc"/>
  <text x="1105" y="215" class="nodeTitle">c_exphlp_nacos</text>
  <text x="1105" y="250" class="text">Nacos Registry</text>
  <text x="1105" y="280" class="text">Ports: 8848 / 9848 / 9849</text>
  <text x="1105" y="310" class="text">职责：服务注册与发现</text>

  <rect x="120" y="560" width="430" height="300" rx="10" class="svc"/>
  <text x="145" y="595" class="nodeTitle">c_exphlp_mongo</text>
  <text x="145" y="630" class="text">MongoDB</text>
  <text x="145" y="660" class="text">Port: 27017</text>
  <text x="145" y="690" class="text">职责：计划/日志/结果/配置存储</text>

  <rect x="600" y="560" width="430" height="300" rx="10" class="svc"/>
  <text x="625" y="595" class="nodeTitle">c_exphlp_rabbitmq</text>
  <text x="625" y="630" class="text">RabbitMQ</text>
  <text x="625" y="660" class="text">Ports: 5672 / 15672</text>
  <text x="625" y="690" class="text">职责：通知异步队列与重试</text>

  <rect x="1080" y="560" width="390" height="300" rx="10" class="svc"/>
  <text x="1105" y="595" class="nodeTitle">Algorithm Service Containers</text>
  <text x="1105" y="630" class="text">nsga2-zdt1 / moead-lsmop / smpso / spea2</text>
  <text x="1105" y="660" class="text">职责：算法执行与指标返回</text>
  <text x="1105" y="690" class="text">通过 Nacos 暴露 serviceName</text>

  <path d="M550 280 L600 280" class="edge"/>
  <text x="565" y="265" class="label">HTTP API</text>

  <path d="M1030 320 L1080 320" class="edge"/>
  <text x="1040" y="305" class="label">Service Discovery</text>

  <path d="M1270 560 L1270 480" class="edge"/>
  <text x="1280" y="520" class="label">Register/Heartbeat</text>

  <path d="M820 480 L820 560" class="edge"/>
  <text x="835" y="525" class="label">Async Notify</text>

  <path d="M600 700 L550 700" class="edge"/>
  <text x="560" y="685" class="label">Read/Write</text>

  <path d="M1030 700 L1080 700" class="edge"/>
  <text x="1038" y="685" class="label">Call Algorithm</text>
</svg>
