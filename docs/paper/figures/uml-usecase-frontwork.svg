<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title { font: 700 34px "Microsoft YaHei", Arial, sans-serif; fill: #1f2937; }
      .actor { font: 600 24px "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .uc { font: 500 20px "Microsoft YaHei", Arial, sans-serif; fill: #1f2937; }
      .note { font: 500 18px "Microsoft YaHei", Arial, sans-serif; fill: #475569; }
      .sys { fill: #f8fafc; stroke: #334155; stroke-width: 2; }
      .oval { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; }
      .line { stroke: #64748b; stroke-width: 2; }
    </style>
  </defs>

  <text x="700" y="60" text-anchor="middle" class="title">执行计划平台前置工作用例图</text>

  <rect x="320" y="110" width="840" height="700" rx="12" class="sys"/>
  <text x="740" y="145" text-anchor="middle" class="note">系统边界：实验助手平台（前置工作阶段）</text>

  <circle cx="140" cy="240" r="28" fill="none" stroke="#334155" stroke-width="2"/>
  <line x1="140" y1="268" x2="140" y2="340" class="line"/>
  <line x1="100" y1="300" x2="180" y2="300" class="line"/>
  <line x1="140" y1="340" x2="100" y2="400" class="line"/>
  <line x1="140" y1="340" x2="180" y2="400" class="line"/>
  <text x="140" y="435" text-anchor="middle" class="actor">平台管理员</text>

  <circle cx="1270" cy="240" r="28" fill="none" stroke="#334155" stroke-width="2"/>
  <line x1="1270" y1="268" x2="1270" y2="340" class="line"/>
  <line x1="1230" y1="300" x2="1310" y2="300" class="line"/>
  <line x1="1270" y1="340" x2="1230" y2="400" class="line"/>
  <line x1="1270" y1="340" x2="1310" y2="400" class="line"/>
  <text x="1270" y="435" text-anchor="middle" class="actor">实验用户</text>

  <ellipse cx="560" cy="240" rx="170" ry="42" class="oval"/>
  <text x="560" y="247" text-anchor="middle" class="uc">配置算法服务与参数模板</text>

  <ellipse cx="900" cy="240" rx="190" ry="42" class="oval"/>
  <text x="900" y="247" text-anchor="middle" class="uc">执行前服务连通性检查</text>

  <ellipse cx="560" cy="390" rx="170" ry="42" class="oval"/>
  <text x="560" y="397" text-anchor="middle" class="uc">创建/编辑执行计划</text>

  <ellipse cx="900" cy="390" rx="190" ry="42" class="oval"/>
  <text x="900" y="397" text-anchor="middle" class="uc">查看阶段化执行日志</text>

  <ellipse cx="560" cy="540" rx="170" ry="42" class="oval"/>
  <text x="560" y="547" text-anchor="middle" class="uc">导出日志与执行结果</text>

  <ellipse cx="900" cy="540" rx="190" ry="42" class="oval"/>
  <text x="900" y="547" text-anchor="middle" class="uc">接收执行通知与补发通知</text>

  <ellipse cx="730" cy="680" rx="220" ry="42" class="oval"/>
  <text x="730" y="687" text-anchor="middle" class="uc">删除一致性处理（幂等/阻断/修复）</text>

  <line x1="170" y1="260" x2="390" y2="240" class="line"/>
  <line x1="170" y1="310" x2="395" y2="390" class="line"/>
  <line x1="170" y1="360" x2="390" y2="540" class="line"/>
  <line x1="170" y1="395" x2="510" y2="680" class="line"/>

  <line x1="1240" y1="260" x2="1090" y2="240" class="line"/>
  <line x1="1240" y1="320" x2="1090" y2="390" class="line"/>
  <line x1="1240" y1="365" x2="1090" y2="540" class="line"/>
  <line x1="1240" y1="400" x2="950" y2="680" class="line"/>
</svg>
