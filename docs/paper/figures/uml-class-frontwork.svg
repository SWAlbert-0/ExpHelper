<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .title { font: 700 34px "Microsoft YaHei", Arial, sans-serif; fill: #1f2937; }
      .className { font: 700 21px "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .field { font: 500 18px "Consolas", "Microsoft YaHei", monospace; fill: #334155; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; }
      .arrow { stroke: #2563eb; stroke-width: 2; fill: none; marker-end: url(#m); }
      .rel { font: 500 16px "Microsoft YaHei", Arial, sans-serif; fill: #1d4ed8; }
    </style>
    <marker id="m" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="#2563eb"/>
    </marker>
  </defs>

  <text x="800" y="60" text-anchor="middle" class="title">核心领域类图（前置工作阶段）</text>

  <rect x="90" y="120" width="360" height="220" rx="10" class="box"/>
  <line x1="90" y1="170" x2="450" y2="170" stroke="#334155" stroke-width="2"/>
  <text x="270" y="153" text-anchor="middle" class="className">ExecutionPlan</text>
  <text x="110" y="205" class="field">+ planId: String</text>
  <text x="110" y="235" class="field">+ planName: String</text>
  <text x="110" y="265" class="field">+ status: PlanStatus</text>
  <text x="110" y="295" class="field">+ startTime/endTime: DateTime</text>
  <text x="110" y="325" class="field">+ description: String</text>

  <rect x="620" y="120" width="360" height="220" rx="10" class="box"/>
  <line x1="620" y1="170" x2="980" y2="170" stroke="#334155" stroke-width="2"/>
  <text x="800" y="153" text-anchor="middle" class="className">PlanAlgorithmBinding</text>
  <text x="640" y="205" class="field">+ bindingId: String</text>
  <text x="640" y="235" class="field">+ planId: String</text>
  <text x="640" y="265" class="field">+ algId: String</text>
  <text x="640" y="295" class="field">+ runNum: int</text>
  <text x="640" y="325" class="field">+ paramsJson: String</text>

  <rect x="1150" y="120" width="360" height="220" rx="10" class="box"/>
  <line x1="1150" y1="170" x2="1510" y2="170" stroke="#334155" stroke-width="2"/>
  <text x="1330" y="153" text-anchor="middle" class="className">AlgorithmLibrary</text>
  <text x="1170" y="205" class="field">+ algId: String</text>
  <text x="1170" y="235" class="field">+ algName: String</text>
  <text x="1170" y="265" class="field">+ serviceName: String</text>
  <text x="1170" y="295" class="field">+ endpoint: String</text>
  <text x="1170" y="325" class="field">+ paramSchema: Json</text>

  <rect x="90" y="430" width="360" height="220" rx="10" class="box"/>
  <line x1="90" y1="480" x2="450" y2="480" stroke="#334155" stroke-width="2"/>
  <text x="270" y="463" text-anchor="middle" class="className">ProblemInstance</text>
  <text x="110" y="515" class="field">+ probId: String</text>
  <text x="110" y="545" class="field">+ probName: String</text>
  <text x="110" y="575" class="field">+ nVars: int</text>
  <text x="110" y="605" class="field">+ dataJson: String</text>
  <text x="110" y="635" class="field">+ refFrontJson: String</text>

  <rect x="620" y="430" width="360" height="220" rx="10" class="box"/>
  <line x1="620" y1="480" x2="980" y2="480" stroke="#334155" stroke-width="2"/>
  <text x="800" y="463" text-anchor="middle" class="className">ExecutionLog</text>
  <text x="640" y="515" class="field">+ logId: String</text>
  <text x="640" y="545" class="field">+ planId: String</text>
  <text x="640" y="575" class="field">+ stage: String</text>
  <text x="640" y="605" class="field">+ level: String</text>
  <text x="640" y="635" class="field">+ message/detail: String</text>

  <rect x="1150" y="430" width="360" height="220" rx="10" class="box"/>
  <line x1="1150" y1="480" x2="1510" y2="480" stroke="#334155" stroke-width="2"/>
  <text x="1330" y="463" text-anchor="middle" class="className">ExecutionResult</text>
  <text x="1170" y="515" class="field">+ executionId: String</text>
  <text x="1170" y="545" class="field">+ planId: String</text>
  <text x="1170" y="575" class="field">+ metricsSummary: Json</text>
  <text x="1170" y="605" class="field">+ runDetails: List&lt;RunMetric&gt;</text>
  <text x="1170" y="635" class="field">+ resultStatus/reason: String</text>

  <rect x="620" y="740" width="360" height="190" rx="10" class="box"/>
  <line x1="620" y1="790" x2="980" y2="790" stroke="#334155" stroke-width="2"/>
  <text x="800" y="773" text-anchor="middle" class="className">NotificationRecord</text>
  <text x="640" y="825" class="field">+ notifyId: String</text>
  <text x="640" y="855" class="field">+ planId: String</text>
  <text x="640" y="885" class="field">+ mailTo/status/retry: String</text>
  <text x="640" y="915" class="field">+ reasonCode/reasonMsg: String</text>

  <path d="M450 230 L620 230" class="arrow"/>
  <text x="510" y="215" class="rel">1..* 绑定</text>

  <path d="M980 230 L1150 230" class="arrow"/>
  <text x="1040" y="215" class="rel">*..1 关联算法</text>

  <path d="M800 340 L800 430" class="arrow"/>
  <text x="820" y="390" class="rel">产生</text>

  <path d="M980 540 L1150 540" class="arrow"/>
  <text x="1040" y="525" class="rel">汇聚</text>

  <path d="M1330 650 L900 740" class="arrow"/>
  <text x="1110" y="715" class="rel">触发通知</text>

  <path d="M270 340 L270 430" class="arrow"/>
  <text x="290" y="390" class="rel">1..* 使用实例</text>

  <path d="M450 540 L620 540" class="arrow"/>
  <text x="505" y="525" class="rel">输入到执行</text>
</svg>
